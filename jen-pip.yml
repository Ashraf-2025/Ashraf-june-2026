pipline {
  agent any
  tools {
    maven   'Maven-3.8.1'
    jdk 'JDK-17'

  } 
  st ages {
    stage( 'checkout' ) {
      steps {
         git url: 'https://github.com/Ashraf-2025/Dockere-machine.git'
      } 
    }
    stage( 'compile') {
        steps {
          sh 'mvn clean compile'
        }
    }

    stage('test') {
      steps {
        sh 'mvn test'
      }
    }
    stage('Package') {
      steps {
         sh 'mvn Package'
      }    
    } 
  }
}
